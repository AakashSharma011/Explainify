<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Explainify • AI PDF Tutor (Dark UI)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1018;          /* app background */
      --panel:#0f1623;       /* cards/panels */
      --muted:#96a2b4;       /* secondary text */
      --text:#e6edf5;        /* primary text */
      --border:#1b2738;      /* subtle borders */
      --primary:#4f9cff;     /* brand accent */
      --primary-2:#6ee7d2;   /* secondary accent */
      --danger:#ff6b6b;      /* error */
      --ok:#34d399;          /* success */
      --chip:#0f1c2a;        /* chips bg */
      --radius:14px;
      --radius-sm:10px;
      --shadow:0 10px 30px rgba(0,0,0,.25);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;background:var(--bg);color:var(--text);}

    /* ---- App Layout ---- */
    .app{display:flex;height:100vh;width:100vw;overflow:hidden}

    /* Sidebar */
    .sidebar{width:320px;min-width:220px;max-width:640px;background:linear-gradient(180deg,#0f1623 0%,#0c1421 100%);border-right:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:14px;transition:width .2s ease, transform .2s ease;box-shadow:var(--shadow);}
    .sidebar.collapsed{transform:translateX(-100%)}

    .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;padding:4px 8px}
    .logo .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-2));box-shadow:0 0 0 4px rgba(79,156,255,.15)}
    .logo .tag{font-weight:600;color:var(--primary-2);margin-left:6px}

    .section h3{margin:6px 2px 8px;font-size:12px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted)}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.02);} 
    .small{min-height:90px;max-height:40vh;overflow:auto}

    #termsBox{display:flex;flex-wrap:wrap;gap:8px}
    .term-chip{background:linear-gradient(180deg,var(--chip),#0c1926);padding:6px 10px;border-radius:999px;border:1px solid #18324b;color:#b8e3ff;cursor:pointer;font-size:12px;transition:transform .12s ease,border-color .2s ease;}
    .term-chip:hover{transform:translateY(-1px);border-color:#2a5c8d}

    /* Resizer handle between sidebar and main */
    .resizer{width:8px;cursor:col-resize;background:linear-gradient(180deg,#0b111c,#0b131e);border-right:1px solid var(--border);border-left:1px solid #0a0f18;position:relative}
    .resizer:after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:3px;height:60px;border-radius:2px;background:#1f2a3a;box-shadow:0 0 0 1px #0b121d, 0 0 10px rgba(0,0,0,.25)}

    /* Main area */
    .main{flex:1;display:flex;flex-direction:column;min-width:0}

    .topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0e1623,#0b121c)}
    .brand{display:flex;align-items:center;gap:8px;margin-right:auto}
    .brand .pill{font-size:11px;color:#0b121c;background:linear-gradient(135deg,var(--primary),var(--primary-2));border-radius:999px;padding:4px 8px;font-weight:700}

    .upload-form{display:flex;gap:10px;align-items:center;width:100%}
    .file-input{position:relative;display:flex;align-items:center}
    .file-input input[type=file]{display:none}
    .file-chip{background:var(--panel);border:1px dashed #27405d;color:var(--muted);padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer}

    .text-input{flex:1;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#0a1220;color:var(--text)}
    .primary{background:linear-gradient(135deg,#4f9cff,#4de4c8);color:#06101b;padding:10px 14px;border-radius:10px;border:0;cursor:pointer;font-weight:700;box-shadow:0 6px 18px rgba(79,156,255,.25);}
    .primary:disabled{opacity:.6;cursor:not-allowed}

    .icon-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 10px;border-radius:10px;cursor:pointer}

    .chat-area{display:flex;flex-direction:column;flex:1;padding:18px;gap:12px;min-height:0}
    .chat-box{flex:1;overflow:auto;display:flex;flex-direction:column;gap:12px;padding-right:6px}
    .msg{max-width:72%;padding:12px 14px;border-radius:14px;line-height:1.45;backdrop-filter:blur(3px);white-space:pre-wrap}
    .msg.bot{background:linear-gradient(180deg,#0f1726,#0b1422);align-self:flex-start;border:1px solid #1a2b42;color:#cfe7ff}
    .msg.user{background:linear-gradient(180deg,#4f9cff,#2f65ff);color:#06101b;align-self:flex-end;border:1px solid rgba(0,0,0,0.04);font-weight:600}
    .msg .muted{color:var(--muted);font-size:13px;margin-top:6px}

    #summaryBox { white-space: pre-wrap; }

    .chat-form{display:flex;gap:10px;padding:12px;border-top:1px solid var(--border)}
    .chat-form input{flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:#0a1220;color:var(--text)}

    /* Modal */
    .modal{position:fixed;inset:0;display:grid;place-items:center;background:rgba(2,6,23,0.55)}
    .modal.hidden{display:none}
    .modal-card{background:var(--panel);padding:18px;border-radius:14px;min-width:320px;max-width:720px;border:1px solid var(--border);box-shadow:var(--shadow)}
    .modal-body{margin-top:8px;color:#cfe7ff;white-space:pre-wrap}

    /* Collapse button floating */
    .collapse{
      position:absolute;left:10px;top:10px;z-index:20;background:#0b1422;border:1px solid var(--border);color:#b8c7de;border-radius:10px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow)
    }

    /* Responsive */
    @media (max-width: 980px){
      .sidebar{position:absolute;z-index:30;height:100vh}
      .resizer{display:none}
      .main{padding-left:0}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="logo"><span class="dot"></span> Explainify <span class="tag">AI Tutor</span></div>
      <div class="section">
        <h3>Document Summary</h3>
        <div id="summaryBox" class="card small">No document uploaded yet.</div>
      </div>
      <div class="section">
        <h3>Complex Terms</h3>
        <div id="termsBox" class="card small">No terms yet.</div>
      </div>
      <div class="section">
        <small style="color:var(--muted)">Tip: Click any term to view its short explanation.</small>
      </div>
    </aside>

    <div class="resizer" id="resizer" title="Drag to resize sidebar"></div>

    <main class="main">
      <div class="topbar">
        <button class="icon-btn" id="collapseBtn" title="Toggle sidebar">☰</button>
        <div class="brand">
          <span class="pill">PDF Tutor</span>
        </div>
        <form id="uploadAndAskForm" class="upload-form" autocomplete="off">
          <label class="file-input">
            <input id="pdfFile" type="file" accept="application/pdf" />
            <span class="file-chip" id="fileChip">Choose PDF…</span>
          </label>
          <input id="initialPrompt" class="text-input" type="text" placeholder="Upload + ask in one go (e.g. ‘Explain chapter 2 in simple words’)" />
          <button type="submit" class="primary" id="uploadBtn">Upload & Ask</button>
        </form>
      </div>

      <section id="chatArea" class="chat-area">
        <div id="chatBox" class="chat-box">
          <div class="msg bot"><strong>Explainify</strong><div class="muted">Upload a PDF and ask anything about it — I'll read & explain.</div></div>
        </div>

        <form id="chatForm" class="chat-form" autocomplete="off">
          <input id="chatInput" type="text" placeholder="Ask follow-up questions…" />
          <button type="submit" class="primary">Send</button>
        </form>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h4 id="modalTitle"></h4>
      <div id="modalBody" class="modal-body"></div>
      <div style="display:flex;justify-content:flex-end;margin-top:12px">
        <button id="modalClose" class="icon-btn">Close</button>
      </div>
    </div>
  </div>

  <script>
    // -------------------- DOM refs --------------------
    const uploadForm = document.getElementById("uploadAndAskForm");
    const pdfFile = document.getElementById("pdfFile");
    const fileChip = document.getElementById("fileChip");
    const uploadBtn = document.getElementById("uploadBtn");
    const initialPrompt = document.getElementById("initialPrompt");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const chatBox = document.getElementById("chatBox");
    const summaryBox = document.getElementById("summaryBox");
    const termsBox = document.getElementById("termsBox");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalClose = document.getElementById("modalClose");
    const sidebar = document.getElementById('sidebar');
    const resizer = document.getElementById('resizer');
    const collapseBtn = document.getElementById('collapseBtn');

    let CURRENT_SESSION = null;

    // -------------------- Helpers --------------------
    function addMessage(who, html) {
      const d = document.createElement("div");
      d.className = `msg ${who==="user"?"user":"bot"}`;
      d.innerHTML = html;
      chatBox.appendChild(d);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    function setSummary(text) {
      summaryBox.textContent = text || "No summary available.";
    }
    function setTerms(terms) {
      termsBox.innerHTML = "";
      if (!terms || terms.length===0) {
        termsBox.innerHTML = "<div class='muted'>No complex terms detected.</div>";
        return;
      }
      terms.forEach(t => {
        const chip = document.createElement("div");
        chip.className = "term-chip";
        chip.textContent = t.term;
        chip.onclick = () => showModal(t.term, t.explanation);
        termsBox.appendChild(chip);
      });
    }
    function showModal(title, body) {
      modalTitle.textContent = title;
      modalBody.textContent = body;
      modal.classList.remove("hidden");
    }
    modalClose.onclick = () => modal.classList.add("hidden");
    modal.onclick = (e)=>{ if(e.target===modal) modal.classList.add('hidden'); };

    function escapeHtml(s){ return (s||"").replace(/[&<>\'\"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c])); }

    // Show file name
    pdfFile.addEventListener('change',()=>{
      fileChip.textContent = pdfFile.files[0]? pdfFile.files[0].name : 'Choose PDF…';
    });

    // -------------------- Upload + Ask --------------------
    uploadForm.addEventListener("submit", async (e)=> {
      e.preventDefault();
      if (!pdfFile.files[0]) return alert("Please pick a PDF file");
      const prompt = initialPrompt.value.trim() || "Give me a simple summary and then answer briefly.";
      addMessage("user", `<strong>Question:</strong> ${escapeHtml(prompt)}`);

      const fd = new FormData();
      fd.append("file", pdfFile.files[0]);
      fd.append("prompt", prompt);

      addMessage("bot", "Reading PDF and preparing summary…");
      uploadBtn.disabled = true;

      try {
        const res = await fetch("/api/upload_and_ask", { method:"POST", body: fd });
        const data = await res.json();
        if (data.error) {
          addMessage("bot", `<span style="color:${getComputedStyle(document.documentElement).getPropertyValue('--danger')}">Error: ${escapeHtml(data.error)}</span>`);
          uploadBtn.disabled = false;
          return;
        }
        CURRENT_SESSION = data.session_id;
        addMessage("bot", `<strong>First answer:</strong><div class="muted">${escapeHtml(data.first_answer)}</div>`);
        setSummary(data.summary);
        setTerms(data.term_explanations || []);
      } catch (err) {
        addMessage("bot", `<span style="color:#ff6b6b">Network error: ${escapeHtml(err.message)}</span>`);
      } finally {
        uploadBtn.disabled = false;
      }
    });

    // -------------------- Follow-up chat --------------------
    chatForm.addEventListener("submit", async (e)=> {
      e.preventDefault();
      const q = chatInput.value.trim();
      if (!q) return;
      if (!CURRENT_SESSION) { addMessage("bot", "Please upload a PDF first."); return; }
      addMessage("user", escapeHtml(q));
      chatInput.value = "";

      addMessage("bot", "Thinking…");

      try {
        const res = await fetch("/api/ask", {method:"POST", headers: {'Content-Type':'application/json'}, body: JSON.stringify({ session_id: CURRENT_SESSION, message: q })});
        const data = await res.json();
        if (data.error) {
          addMessage("bot", `<span style=\"color:#ff6b6b\">Error: ${escapeHtml(data.error)}</span>`);
          return;
        }
        addMessage("bot", `<div class="muted">${escapeHtml(data.answer)}</div>`);
      } catch (err) {
        addMessage("bot", `<span style=\"color:#ff6b6b\">Network error: ${escapeHtml(err.message)}</span>`);
      }
    });

    // -------------------- Sidebar Resize (drag handle) --------------------
    // Persist width to localStorage so it survives refresh
    const KEY = 'explainify.sidebar.width';
    const saved = localStorage.getItem(KEY);
    if (saved) sidebar.style.width = saved + 'px';

    let startX = 0, startW = 0, dragging = false;
    resizer.addEventListener('mousedown', (e)=>{
      dragging = true; startX = e.clientX; startW = sidebar.getBoundingClientRect().width;
      document.body.style.userSelect = 'none';
    });
    window.addEventListener('mousemove', (e)=>{
      if(!dragging) return;
      const dx = e.clientX - startX;
      const next = Math.min(640, Math.max(220, startW + dx));
      sidebar.style.width = next + 'px';
    });
    window.addEventListener('mouseup', ()=>{
      if(!dragging) return; dragging = false; document.body.style.userSelect = '';
      const w = sidebar.getBoundingClientRect().width|0; localStorage.setItem(KEY, w);
    });

    // Collapse / Expand (also on small screens acts like drawer)
    collapseBtn.addEventListener('click', ()=>{
      const isHidden = sidebar.classList.toggle('collapsed');
      if(!isHidden){
        // Restore width
        const w = parseInt(localStorage.getItem(KEY)||320,10);
        sidebar.style.width = w + 'px';
      }
    });

    // Keyboard shortcut: Cmd/Ctrl + B toggles sidebar
    window.addEventListener('keydown', (e)=>{
      if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='b') {
        e.preventDefault(); collapseBtn.click();
      }
    });
  </script>
</body>
</html>
