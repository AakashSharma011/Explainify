services:
  - type: web
    name: explainify
    runtime: python
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_sm"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false   # value set manually in Render dashboard — never hardcoded
    plan: free
